<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FAF7EF" />
  <title>연필 타임랩스 — 공부 타임랩스</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="연필타임랩스" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- 손그림 흔들림 SVG 필터 (두들링 테두리) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="7" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div id="app">
    <!-- ===== 진입 화면 (모드 선택) ===== -->
    <section id="screen-entry" class="screen entry active">
      <div class="logo">✎ 연필 타임랩스</div>
      <div class="char-wrap">
        <img src="assets/pencil_1h.png" alt="연필 캐릭터" />
      </div>
      <div class="entry-buttons">
        <button id="btn-mode-solo" class="doodle-btn primary">혼자하기</button>
        <button id="btn-mode-friends" class="doodle-btn ghost">친구와 함께하기</button>
      </div>
      <div class="entry-note sub-text">혼자하기는 로그인 없이 바로 시작해요</div>
    </section>

    <!-- ===== 홈 화면 ===== -->
    <section id="screen-home" class="screen home">
      <div class="topbar">
        <button id="btn-home-back" class="back-btn">‹ 모드</button>
      </div>

      <div class="char-wrap">
        <img id="home-char" src="assets/pencil_1h.png" alt="연필 캐릭터" />
      </div>

      <div class="stats">
        <div class="stat doodle-box">
          <div class="label">오늘 공부</div>
          <div class="value" id="stat-today">00:00:00</div>
        </div>
        <div class="stat doodle-box">
          <div class="label">연속</div>
          <div class="value" id="stat-streak">0일</div>
        </div>
      </div>

      <button id="btn-start" class="doodle-btn primary start-btn">공부 시작</button>

      <!-- 광고 배너 자리 (네이티브 AdMob. 광고 제거 구매 시 사라짐) -->
      <div class="ad-banner" aria-hidden="true">광고 영역 · 배너</div>
    </section>

    <!-- ===== 촬영 화면 ===== -->
    <section id="screen-capture" class="screen capture">
      <canvas id="cap-canvas"></canvas>
      <div class="overlay-ui">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div class="rec-row">
            <span class="rec-dot" id="rec-dot"></span>
            <span class="rec-label" id="rec-label">REC</span>
          </div>
          <select id="demo-speed" class="demo-speed hidden" title="공부 시간 흐름 속도">
            <option value="1" selected>실시간</option>
          </select>
        </div>
        <div class="bottom-row">
          <div class="capture-controls">
            <button id="btn-pause" class="ctrl-btn" aria-label="일시정지">❚❚</button>
            <button id="btn-stop" class="stop-btn" aria-label="정지"></button>
            <span class="ctrl-spacer"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 결과 화면 ===== -->
    <section id="screen-result" class="screen result">
      <div class="topbar">
        <button id="btn-back" class="back-btn">‹ 홈</button>
      </div>
      <div class="card-title">오늘의 공부 기록</div>

      <div class="result-card doodle-box">
        <video id="result-video" playsinline autoplay loop muted controls></video>
        <div class="summary">
          <div class="big" id="result-total">00:00:00</div>
          <div class="final-state" id="result-state">—</div>
          <div class="final-line" id="result-line">—</div>
        </div>
      </div>

      <div class="result-actions">
        <button id="btn-save" class="doodle-btn">갤러리 저장</button>
        <button id="btn-share" class="doodle-btn primary">공유</button>
      </div>
      <button id="btn-again" class="again">다시 찍기</button>
    </section>
  </div>

  <div id="toast"></div>

  <script src="js/character.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
